<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#153f7a">
<title>ALKÜ Depo </title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
  <div class="brand">
    <div>
      <h1>ALKÜ Bilgi İşlem Daire Başkanlığı</h1>
      <p>Ses Sistemi Depo </p>
    </div>
  </div>
</header>

<main>
  <section class="toolbar">
    <input id="search" placeholder="Malzeme, ürün kodu, marka veya model ara">
    <button class="primary" id="giveBtn">Malzeme Ver</button>
    <button class="accent" id="receiveBtn">Teslim Al</button>
  </section>

  <section class="stats">
    <div class="stat"><span>Ürün Çeşidi</span><strong id="statKinds">0</strong></div>
    <div class="stat"><span>Sistem Stoku</span><strong id="statSystem">0</strong></div>
    <div class="stat"><span>Fiziksel Stok</span><strong id="statPhysical">0</strong></div>
    <div class="stat"><span>Eksik</span><strong id="statMissing">0</strong></div>
  </section>

  <section id="cabinetTabs" class="tabs"></section>

  <section class="panel">
    <div class="panel-head">
      <h2 id="inventoryTitle">Tüm Envanter</h2>
      <button class="ghost" id="resetBtn">Tümünü Göster</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>Kod</th><th>Kategori</th><th>Malzeme</th><th>Marka</th><th>Model</th><th>Sistem</th><th>Fiziksel</th><th>Dolap</th><th>Durum</th></tr>
        </thead>
        <tbody id="inventoryBody"></tbody>
      </table>
    </div>
  </section>

  <section class="panel">
    <div class="panel-head">
      <h2>Hareket Geçmişi</h2>
      <div class="head-actions">
        <button class="ghost" id="exportBtn">Yedek İndir</button>
        <label class="ghost file-label">Yedek Yükle<input id="importInput" type="file" accept=".json"></label>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>Tarih</th><th>İşlem</th><th>Malzeme</th><th>Adet</th><th>Kişi</th><th>Birim/Etkinlik</th><th>İşlemi Yapan</th><th>Durum</th></tr>
        </thead>
        <tbody id="movementBody"></tbody>
      </table>
    </div>
  </section>
</main>

<div class="modal" id="giveModal">
  <div class="dialog">
    <h3>Malzeme Ver</h3>
    <label>Ürün<select id="giveCode"></select></label>
    <div class="grid2">
      <label>Adet<input id="giveQty" type="number" min="1" value="1"></label>
      <label>Alan kişi<input id="givePerson" placeholder="Ad Soyad"></label>
    </div>
    <label>Birim / Etkinlik<input id="giveUnit" placeholder="Örn. Konferans Salonu"></label>
    <div class="grid2">
      <label>Planlanan iade<input id="giveReturn" type="date"></label>
      <label>İşlemi yapan<input id="giveOperator" placeholder="Ad Soyad"></label>
    </div>
    <label>Not<textarea id="giveNote" rows="3"></textarea></label>
    <div class="actions">
      <button class="ghost" data-close="giveModal">İptal</button>
      <button class="primary" id="saveGive">Kaydet</button>
    </div>
  </div>
</div>

<div class="modal" id="receiveModal">
  <div class="dialog">
    <h3>Teslim Al</h3>
    <label>Açık hareket<select id="receiveMovement"></select></label>
    <label>İade adedi<input id="receiveQty" type="number" min="1" value="1"></label>
    <label>İşlemi yapan<input id="receiveOperator" placeholder="Ad Soyad"></label>
    <label>Not<textarea id="receiveNote" rows="3"></textarea></label>
    <div class="actions">
      <button class="ghost" data-close="receiveModal">İptal</button>
      <button class="accent" id="saveReceive">İadeyi Kaydet</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
