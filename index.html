<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ALKÜ Depo Yönetim Portalı</title>
<style>
:root{--navy:#123a73;--teal:#0ea5b7;--gold:#d6b34b;--bg:#f5f7fb;--card:#fff;--text:#1f2937;--muted:#64748b;--danger:#b91c1c;--ok:#166534}
*{box-sizing:border-box} body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
header{background:linear-gradient(135deg,var(--navy),#1b5aa6);color:#fff;padding:22px 18px;position:sticky;top:0;z-index:5;box-shadow:0 3px 15px #0002}
.brand{max-width:1100px;margin:auto;display:flex;gap:16px;align-items:center} .brand img{width:76px;height:76px;object-fit:contain;background:#fff;border-radius:50%;padding:3px}
.brand h1{font-size:1.35rem;margin:0 0 5px} .brand p{margin:0;opacity:.9}
main{max-width:1100px;margin:22px auto;padding:0 16px 40px}
.toolbar{display:grid;grid-template-columns:1fr auto;gap:10px;margin-bottom:18px} input{width:100%;padding:14px 16px;border:1px solid #cbd5e1;border-radius:12px;font-size:1rem}
button{border:0;border-radius:12px;padding:12px 16px;background:var(--navy);color:#fff;font-weight:700;cursor:pointer}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px}
.card{background:var(--card);border-radius:16px;padding:18px;box-shadow:0 6px 18px #0f172a12;border:1px solid #e5e7eb}
.card h2{margin:0;font-size:1.7rem;color:var(--navy)} .metric{font-size:1.6rem;font-weight:800;margin-top:8px}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0} .tab{background:#e7eef8;color:var(--navy)} .tab.active{background:var(--navy);color:#fff}
.section-title{display:flex;justify-content:space-between;align-items:end;gap:10px;margin:18px 0 10px} .section-title h2{margin:0;color:var(--navy)} .small{font-size:.86rem;color:var(--muted)}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 6px 18px #0f172a10}
th,td{padding:12px 10px;border-bottom:1px solid #e5e7eb;text-align:left;font-size:.92rem} th{background:#0ea5b7;color:#fff;position:sticky;top:120px}
tr:last-child td{border-bottom:0} .badge{display:inline-block;padding:4px 8px;border-radius:999px;font-size:.78rem;font-weight:700} .ok{background:#dcfce7;color:var(--ok)} .bad{background:#fee2e2;color:var(--danger)}
.empty{background:#fff;padding:30px;border-radius:14px;text-align:center;color:var(--muted)}
footer{text-align:center;color:var(--muted);padding:24px 12px}
@media(max-width:820px){.cards{grid-template-columns:repeat(2,1fr)} th:nth-child(2),td:nth-child(2),th:nth-child(4),td:nth-child(4),th:nth-child(5),td:nth-child(5){display:none} .brand img{width:58px;height:58px} .brand h1{font-size:1.05rem}}
@media(max-width:480px){.cards{grid-template-columns:1fr 1fr} .toolbar{grid-template-columns:1fr} th,td{padding:10px 7px;font-size:.83rem}}
</style>
</head>

let cabinet = location.hash ? location.hash.replace('#','').toUpperCase() : 'ALL';
if(!['D1','D2','D3','D4'].includes(cabinet)) cabinet='ALL';
const search = document.getElementById('search');

function fmtStatus(s){return `<span class="badge ${s==='Eksik'?'bad':'ok'}">${s}</span>`}
function filtered(){
 const q=search.value.trim().toLocaleLowerCase('tr');
 return data.filter(x => (cabinet==='ALL'||x.cabinet===cabinet) &&
  (!q || [x.code,x.category,x.name,x.brand,x.model,x.cabinet,x.status].join(' ').toLocaleLowerCase('tr').includes(q)));
}
function renderMetrics(){
 const list=filtered();
 const sys=list.reduce((a,b)=>a+b.system,0);
 const phy=list.reduce((a,b)=>a+b.physical,0);
 const miss=Math.max(0,sys-phy);
 document.getElementById('metrics').innerHTML = `
 <div class="card"><h2>Ürün Çeşidi</h2><div class="metric">${list.length}</div></div>
 <div class="card"><h2>Sistem Stoku</h2><div class="metric">${sys}</div></div>
 <div class="card"><h2>Fiziksel Stok</h2><div class="metric">${phy}</div></div>
 <div class="card"><h2>Eksik</h2><div class="metric">${miss}</div></div>`;
}
function render(){
 const list=filtered();
 document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.cab===cabinet));
 document.getElementById('title').textContent = cabinet==='ALL'?'Tüm Envanter':`${cabinet} Dolabı`;
 document.getElementById('updated').textContent = 'Son görüntüleme: '+new Date().toLocaleString('tr-TR');
 renderMetrics();
 if(!list.length){document.getElementById('tableWrap').innerHTML='<div class="empty">Kayıt bulunamadı.</div>';return}
 document.getElementById('tableWrap').innerHTML = `<table><thead><tr><th>Kod</th><th>Kategori</th><th>Malzeme</th><th>Marka</th><th>Model</th><th>Stok</th><th>Fiziksel</th><th>Dolap</th><th>Durum</th></tr></thead>
 <tbody>${list.map(x=>`<tr><td><b>${x.code}</b></td><td>${x.category}</td><td>${x.name}</td><td>${x.brand||'-'}</td><td>${x.model||'-'}</td><td>${x.system}</td><td>${x.physical}</td><td><b>${x.cabinet}</b></td><td>${fmtStatus(x.status)}</td></tr>`).join('')}</tbody></table>`;
}
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{cabinet=b.dataset.cab; location.hash=cabinet==='ALL'?'':cabinet; render();});
search.addEventListener('input',render);
window.addEventListener('hashchange',()=>{cabinet=location.hash?location.hash.replace('#','').toUpperCase():'ALL';render()});
function resetView(){search.value='';cabinet='ALL';location.hash='';render()}
render();
